<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Resultado</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
              rel="stylesheet">
        <link rel="stylesheet" href="/css/style.css" th:href="@{/css/style.css}">
        <style>
            .result-screen {
                min-height: 100vh;
                display: grid;
                place-items: center;
                padding: 2rem;
                background:
                    radial-gradient(circle at top left, rgba(29, 105, 112, 0.18), transparent 28%),
                    radial-gradient(circle at top right, rgba(195, 144, 69, 0.22), transparent 22%),
                    linear-gradient(180deg, #f7f1e9 0%, #ede6dc 100%);
            }

            .result-box {
                width: min(100%, 760px);
                padding: 3rem;
                border-radius: 34px;
                background: rgba(255, 251, 245, 0.94);
                box-shadow: 0 28px 70px rgba(24, 47, 57, 0.15);
                text-align: center;
            }

            .result-box h1 {
                margin-bottom: 1.25rem;
                font-size: clamp(2.1rem, 4vw, 3.4rem);
                letter-spacing: -0.04em;
                color: #193943;
            }

            .result-state {
                margin-bottom: 1rem;
                padding: 1rem 1.25rem;
                border-radius: 20px;
                font-size: 1.1rem;
                font-weight: 700;
            }

            .result-state-ok {
                background: #dcefe5;
                color: #235840;
            }

            .result-state-error {
                background: #f5dfdb;
                color: #8b362d;
            }
        </style>
    </head>
    <body class="result-page result-screen">
        <main class="result-card result-box text-center">
            <h1 class="result-title">
                Resultado
            </h1>

            <h2 class="result-message result-message-success result-state result-state-ok"
                th:if="${mensaje}"
                th:text="${mensaje}">
            </h2>

            <h2 class="result-message result-message-error result-state result-state-error"
                th:if="${error}"
                th:text="${error}">
            </h2>

            <a href="/"
               class="btn btn-primary px-4 result-link">
                Volver
            </a>
        </main>
    </body>
</html>
